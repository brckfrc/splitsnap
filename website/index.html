<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitSnap</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <style>
    :root { --bg:#0f1115; --fg:#e8eaed; --muted:#9aa3af; --primary:#4ba3f5; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg); color:var(--fg); text-align:center; padding:24px;
    }
    .container { max-width: 400px; width: 100%; }
    .logo { width:88px; height:88px; border-radius:20px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); margin:0 auto 24px; display:block; }
    h1 { margin:0 0 8px; font-size:34px; font-weight: 700; letter-spacing: -0.5px; }
    p { color:var(--muted); margin:0 0 32px; font-size: 17px; line-height: 1.4; }
    a.text-link { color:var(--primary); text-decoration: none; font-size: 14px; }
    a.text-link:hover { text-decoration: underline; }
    
    .store-badge { 
      display:inline-block; 
      margin: 0 auto 32px; 
      transition: transform 0.2s ease, opacity 0.2s;
    }
    .store-badge:hover { 
      transform: scale(1.02);
      opacity: 0.9;
    }
    .store-badge img { height: 48px; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Uygulama Logosu -->
    <img class="logo" src="/android-chrome-512x512.png" alt="SplitSnap Logo" />
    
    <h1>SplitSnap</h1>
    <p>Grup harcamalarını kolayca böl, fişten otomatik doldur.</p>
    
    <!-- App Store İndirme Butonu -->
    <a href="https://apps.apple.com/app/splitsnap/id6774394620" class="store-badge" target="_blank" rel="noopener noreferrer" aria-label="Download on the App Store">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store" />
    </a>
    
    <div>
      <a href="/privacy" class="text-link">Gizlilik Politikası</a>
    </div>
  </div>
</body>
</html>
