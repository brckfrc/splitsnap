<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitSnap</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <style>
    :root { --bg:#0f1115; --fg:#e8eaed; --muted:#9aa3af; --primary:#4ba3f5; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg); color:var(--fg); text-align:center; padding:24px;
    }
    .logo { width:72px; height:72px; border-radius:18px; overflow:hidden; margin:0 auto 20px; display:block; }
    h1 { margin:0 0 8px; font-size:32px; }
    p { color:var(--muted); margin:0 0 24px; }
    a { color:var(--primary); }
  </style>
</head>
<body>
  <div>
    <img class="logo" src="/android-chrome-512x512.png" alt="SplitSnap" />
    <h1>SplitSnap</h1>
    <p>Grup harcamalarını kolayca böl, fişten otomatik doldur.</p>
    <a href="/privacy">Gizlilik Politikası</a>
  </div>
</body>
</html>
