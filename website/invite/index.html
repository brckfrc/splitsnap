<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitSnap — Grup Daveti</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style>
    :root { --bg:#0f1115; --fg:#e8eaed; --muted:#9aa3af; --primary:#4ba3f5; --card:#1a1e26; --border:#232830; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg); text-align: center; padding: 24px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 40px 32px; max-width: 380px; width: 100%;
    }
    .logo { width: 72px; height: 72px; border-radius: 18px; overflow: hidden; margin: 0 auto 20px; display: block; }
    h1 { margin: 0 0 8px; font-size: 24px; font-weight: 700; }
    p { color: var(--muted); margin: 0 0 28px; font-size: 15px; line-height: 1.5; }
    .btn {
      display: block; width: 100%; padding: 14px 24px; border-radius: 12px; border: none;
      font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none;
      margin-bottom: 12px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .code { font-family: monospace; font-size: 20px; letter-spacing: 4px; color: var(--primary);
      background: rgba(75,163,245,.12); padding: 10px 20px; border-radius: 10px;
      display: inline-block; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/android-chrome-512x512.png" alt="SplitSnap" />
    <h1>Grup Daveti</h1>
    <p id="subtitle">Seni bir gruba davet ettiler.</p>
    <div class="code" id="codeDisplay"></div>
    <a class="btn btn-primary" id="openBtn" href="#">Uygulamada Aç</a>
    <a class="btn btn-secondary" href="https://apps.apple.com/app/id6774394620" target="_blank">
      App Store'dan İndir
    </a>
  </div>

  <script>
    // Extract the invite code from the URL path: /invite/ABC123
    const parts = window.location.pathname.split('/').filter(Boolean);
    const code = parts[1] ? parts[1].toUpperCase() : null;

    if (code) {
      document.getElementById('codeDisplay').textContent = code;
      document.getElementById('subtitle').textContent =
        'Aşağıdaki butona bas ya da kodu uygulamaya gir.';

      // Deep link — if app is installed this opens it directly
      const deepLink = 'splitsnap://invite/' + code;
      document.getElementById('openBtn').href = deepLink;

      // Try to open the app automatically after a short delay.
      // If not installed, the href fallback (App Store button) handles it.
      setTimeout(() => { window.location.href = deepLink; }, 600);
    } else {
      document.getElementById('codeDisplay').style.display = 'none';
      document.getElementById('openBtn').style.display = 'none';
    }
  </script>
</body>
</html>
